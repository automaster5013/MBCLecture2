<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>웹 테스트 3</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, "맑은 고딕", sans-serif;
            background: #f5f5f5;
        }

        /* 상단 고정 네비게이션 */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: #1e88e5;
            color: white;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            z-index: 1000;
        }

        nav .logo {
            font-weight: bold;
            font-size: 18px;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 16px;
            margin: 0;
            padding: 0;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
            font-size: 14px;
        }

        nav ul li a:hover {
            text-decoration: underline;
        }

        /* 네비게이션 때문에 내용이 가려지지 않도록 위쪽 여백 */
        main {
            padding: 100px 24px 40px;
            text-align: center;
        }

        /* 제목 애니메이션 */
        h1 {
            margin: 16px 0;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.8s ease-out forwards;
        }

        h1:nth-of-type(1) {
            animation-delay: 0.1s;
        }
        h1:nth-of-type(2) {
            animation-delay: 0.3s;
        }
        h1:nth-of-type(3) {
            animation-delay: 0.5s;
        }
        h1:nth-of-type(4) {
            animation-delay: 0.7s;
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <!-- 상단 고정 네비게이션 -->
    <nav>
        <div class="logo">MBC 컴퓨터 아카데미</div>
        <ul>
            <li><a href="#hello">홈</a></li>
            <li><a href="#devops">DevOps 과정</a></li>
            <li><a href="#java">자바 과정</a></li>
        </ul>
    </nav>

    <!-- 본문 내용 -->
    <main>
        <h1 id="hello">Hello World!!</h1>
        <h1>MBC컴퓨터아카데미 천호점</h1>
        <h1 id="devops">데브옵스과정(DevOps과정)</h1>
        <h1 id="java">자바 개발 과정</h1>
    </main>
</body>
</html>
